<!DOCTYPE html>
<html>
<head>
<title>Apply Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.header {
  text-align: center;
  padding: 25px;
  font-size: 26px;
  color: #38bdf8;
}

.container {
  width: 90%;
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
}

input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">🌐 APPLY DASHBOARD</div>

<div class="container">

<h3>Application Form</h3>

<input id="username" placeholder="Discord Username">
<input id="discordId" placeholder="Discord ID">
<input id="age" placeholder="Age">
<textarea id="reason" placeholder="Why do you want to join?"></textarea>

<button onclick="submitApp()">Submit</button>

</div>

<script>
async function submitApp() {
  const username = document.getElementById("username").value;
  const discordId = document.getElementById("discordId").value;
  const age = document.getElementById("age").value;
  const reason = document.getElementById("reason").value;

  const res = await fetch("/apply", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, discordId, age, reason })
  });

  const data = await res.json();

  if (data.success) {
    alert("Application sent!");
  } else {
    alert("Error submitting application");
  }
}
</script>

</body>
</html>
